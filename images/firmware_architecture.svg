<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="520" fill="#ffffff"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Firmware Architecture — Layered Modules</text>

  <!-- Layer 4: Orchestration -->
  <rect x="60" y="70" width="880" height="70" rx="8" fill="#fef6e0" stroke="#b7791f" stroke-width="2"/>
  <text x="80" y="95" font-size="12" font-weight="bold" fill="#1a1a1a">Orchestration Layer</text>
  <text x="80" y="115" font-size="11" fill="#4a4a4a">BatteryMonitoringSystem.ino  (setup/loop)</text>
  <text x="450" y="115" font-size="11" fill="#4a4a4a">scheduler.h / scheduler.cpp  (cooperative task scheduler)</text>

  <!-- Layer 3: Communication -->
  <rect x="60" y="160" width="880" height="70" rx="8" fill="#fbeaea" stroke="#c53030" stroke-width="2"/>
  <text x="80" y="185" font-size="12" font-weight="bold" fill="#1a1a1a">Communication Layer</text>
  <text x="80" y="205" font-size="11" fill="#4a4a4a">can_protocol.h / can_protocol.cpp  (frame packing 0x100-0x105)</text>

  <!-- Layer 2: Application -->
  <rect x="60" y="250" width="880" height="70" rx="8" fill="#eefaf0" stroke="#2f855a" stroke-width="2"/>
  <text x="80" y="275" font-size="12" font-weight="bold" fill="#1a1a1a">Application Layer</text>
  <text x="80" y="295" font-size="11" fill="#4a4a4a">battery.h / battery.cpp  (aggregation, filtering, status evaluation)</text>
  <text x="620" y="295" font-size="11" fill="#4a4a4a">filter.h / filter.cpp</text>

  <!-- Layer 1: HAL -->
  <rect x="60" y="340" width="880" height="100" rx="8" fill="#eef4fb" stroke="#2b6cb0" stroke-width="2"/>
  <text x="80" y="365" font-size="12" font-weight="bold" fill="#1a1a1a">Hardware Abstraction Layer</text>
  <g font-size="11" fill="#4a4a4a">
    <text x="80" y="390">ina219.h/.cpp</text>
    <text x="270" y="390">ds18b20.h/.cpp</text>
    <text x="460" y="390">hx711.h/.cpp</text>
    <text x="650" y="390">mcp2515.h/.cpp</text>
    <text x="80" y="410">uart_debug.h/.cpp</text>
    <text x="270" y="410">utilities.h/.cpp</text>
    <text x="460" y="410">config.h (pins, thresholds, timing)</text>
  </g>

  <!-- Arrows between layers -->
  <g stroke="#333333" stroke-width="1.5" fill="none" marker-end="url(#arrow2)">
    <line x1="500" y1="140" x2="500" y2="160"/>
    <line x1="500" y1="230" x2="500" y2="250"/>
    <line x1="500" y1="320" x2="500" y2="340"/>
  </g>

  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>

  <text x="500" y="480" text-anchor="middle" font-size="11" fill="#6a6a6a">Each layer depends only on the layer(s) below it — no upward or sibling coupling.</text>
</svg>
